<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* Ensure the body takes the full height of the viewport */
      html,
      body {
        height: 100%;
      }
      /* Center the form vertically and horizontally */
      .centered-form {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav
      class="navbar navbar-expand-lg fixed-top"
      style="background-color: #f8f9fa; padding: 1rem"
    >
      <div class="container">
        <a
          class="navbar-brand"
          href="{{ url_for('second_dashboard') }}"
          style="font-size: 2.3rem; font-weight: bold; color: #00a8ff"
          >HealthTech</a
        >
        <!-- Buttons for News and History aligned in the navbar -->
        <div class="ml-auto">
          <a
            href="{{ url_for('display_health_news') }}"
            class="btn btn-primary"
            style="margin-right: 10px; background-color: #00a8ff; border: none"
            >News</a
          >
          <a
            href="{{ url_for('display_history') }}"
            class="btn btn-primary"
            style="background-color: #00a8ff; border: none"
            >History</a
          >
        </div>
      </div>
    </nav>

    <div class="container centered-form">
      <div class="col-lg-8 col-md-8 mt-5">
        <h1 class="my-3 text-center">Patient Information</h1>
        <form method="POST" action="/hospital-register">
          <div class="mb-3">
            <label for="firstname" class="form-label">First Name</label>
            <input type="text" class="form-control" name="firstname" required />
          </div>
          <div class="mb-3">
            <label for="surname" class="form-label">Surname</label>
            <input type="text" class="form-control" name="surname" required />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required />
          </div>
          <div class="mb-3">
            <label for="phonenumber" class="form-label">Phone Number</label>
            <input
              type="text"
              class="form-control"
              name="phonenumber"
              required
            />
          </div>
          <div class="mb-3">
            <label for="dateofbirth" class="form-label">Date of Birth</label>
            <input
              type="date"
              class="form-control"
              name="dateofbirth"
              required
            />
          </div>
          <div class="mb-3">
            <label for="gender" class="form-label">Gender</label>
            <select class="form-control" name="gender" required>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
      </div>
    </div>
  </body>
</html>
